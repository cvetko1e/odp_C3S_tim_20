services:

  # ── MASTER ─────────────────────────────────────────────────
  mysql-master:
    build:
      context: ./docker/master
      dockerfile: Dockerfile
    container_name: project_master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: pulsenet
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:?MYSQL_REPLICATION_USER is required}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD:?MYSQL_REPLICATION_PASSWORD is required}
    ports:
      - "3306:3306"
    volumes:
      - master_data:/var/lib/mysql
    networks:
      - project_net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── SLAVE 1 ────────────────────────────────────────────────
  mysql-slave1:
    build:
      context: ./docker/slave1
      dockerfile: Dockerfile
    container_name: project_slave1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: pulsenet
    ports:
      - "3307:3306"
    volumes:
      - slave1_data:/var/lib/mysql
    networks:
      - project_net
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── SLAVE 2 ────────────────────────────────────────────────
  mysql-slave2:
    build:
      context: ./docker/slave2
      dockerfile: Dockerfile
    container_name: project_slave2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: pulsenet
    ports:
      - "3308:3306"
    volumes:
      - slave2_data:/var/lib/mysql
    networks:
      - project_net
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 15

  # ── SERVER (Node.js API) ───────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: project_server
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CLIENT_URL: http://localhost:5173
      DB_MASTER_HOST: mysql-master
      DB_MASTER_PORT: 3306
      DB_MASTER_USER: root
      DB_MASTER_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      DB_MASTER_NAME: pulsenet
      DB_SLAVE1_HOST: mysql-slave1
      DB_SLAVE1_PORT: 3306
      DB_SLAVE1_USER: root
      DB_SLAVE1_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      DB_SLAVE1_NAME: pulsenet
      DB_SLAVE2_HOST: mysql-slave2
      DB_SLAVE2_PORT: 3306
      DB_SLAVE2_USER: root
      DB_SLAVE2_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      DB_SLAVE2_NAME: pulsenet
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SALT_ROUNDS: 10
      HEALTH_CHECK_INTERVAL: 10000
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave1:
        condition: service_healthy
      mysql-slave2:
        condition: service_healthy
    networks:
      - project_net

volumes:
  master_data:
  slave1_data:
  slave2_data:

networks:
  project_net:
    driver: bridge
